name: cobml
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core scientific computing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0

  # Machine learning - core
  - scikit-learn>=1.3.0
  - xgboost>=2.0.0
  - lightgbm>=4.1.0

  # Deep learning (PyTorch)
  - pytorch>=2.0.0
  - pytorch-cuda=11.8  # Adjust based on your CUDA version
  - cudatoolkit=11.8   # Adjust based on your CUDA version

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Statistical analysis
  - statsmodels>=0.14.0

  # Jupyter
  - jupyter>=1.0.0
  - ipykernel>=6.25.0

  # Utilities
  - tqdm>=4.66.0
  - requests>=2.31.0

  # pip-only dependencies
  - pip
  - pip:
      # TabNet (not available via conda)
      - pytorch-tabnet>=4.1.0
      
      # Transformers ecosystem
      - transformers>=4.35.0
      - datasets>=2.15.0
      - tokenizers>=0.15.0
      - sentence-transformers>=2.2.0
      
      # Explainability
      - shap>=0.43.0
      
      # Statistical analysis
      - pingouin>=0.5.3

# Post-installation notes:
# 1. Activate environment: conda activate cobml
# 2. Verify GPU access: python -c "import torch; print(torch.cuda.is_available())"
# 3. Run experiments: jupyter notebook notebooks/COB_ML_Experiments.ipynb
